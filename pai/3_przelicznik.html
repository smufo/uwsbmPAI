<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przeliczanie temperatury</title>
</head>
<style>
    body {
        font-family: Arial;
        background-color: palevioletred;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container{
        background: white;
        padding: 30px;
        border-radius: 10px;
        box-shadow: -10px 0 10px rgba(0, 0, 0, 0.2);
        text-align: center;
        width: 300px;
    }
</style>
<body>
    <div class="container">
        <h2>Fahrenheit -> Celcjusz</h2>

        <form>
            Podaj temperaturę w °F:<br>
            <input type="number" id="fahrenheit">
            <button type="button" onclick="convertTemp()">Przelicz</button>
        </form>
        <p id="result"></p>
    </div>
    <script>
        function convertTemp(){
            let fahrenheitValue = document.getElementById("fahrenheit").value;
            let celciusValue = (fahrenheitValue - 32) * 5/9;

            document.getElementById("result").innerHTML = "Temperatura to " + celciusValue.toFixed(2) + "°C";
        }
    </script>
</body>
</html>
